<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photos - Kumar Bhattarai</title>
    <link rel="stylesheet" href="src/output.css">
    <link rel="stylesheet" href="style2.css">
    <script src="https://kit.fontawesome.com/e6f520f290.js" crossorigin="anonymous" defer></script>
</head>
<body class="bg-slate-900 max-h-screen">

    <div class="flex items-center justify-center min-h-[100vh]">
        <i class="fa-solid fa-backward p-5 mr-7 bg-gray-500 text-blue-200 rounded-3xl cursor-pointer" id="backbtn"></i>
        <div class="flex items-center justify-center overflow-x-auto w-[65vw]" id="ab">
            <div class="flex gap-4">
                <span class="flex-none">
                    <picture>
                        <source srcset="i/webp/1.webp" type="image/webp">
                        <img src="i/1.jpg" alt="Image 1" class="w-80 h-auto" width="320" height="240">
                    </picture>
                </span>
                <span class="flex-none">
                    <picture>
                        <source srcset="i/webp/2.webp" type="image/webp">
                        <img src="i/2.jpg" alt="Image 2" class="w-80 h-auto" width="320" height="240">
                    </picture>
                </span>
                <span class="flex-none">
                    <picture>
                        <source srcset="i/webp/3.webp" type="image/webp">
                        <img src="i/3.jpg" alt="Image 3" class="w-80 h-auto" width="320" height="240">
                    </picture>
                </span>

                <div class="flex gap-4">
                    <span class="flex-none">
                        <picture>
                            <source srcset="i/webp/4.webp" type="image/webp">
                            <img loading="lazy" src="i/4.jpg" alt="Image 4" class="w-80 h-auto" width="320" height="240">
                        </picture>
                    </span>
                    <span class="flex-none">
                        <picture>
                            <source srcset="i/webp/5.webp" type="image/webp">
                            <img loading="lazy" src="i/5.jpg" alt="Image 5" class="w-80 h-60" width="320" height="240">
                        </picture>
                    </span>
                    <span class="flex-none">
                        <picture>
                            <source srcset="i/webp/11.webp" type="image/webp">
                            <img loading="lazy" src="i/11.jpg" alt="Image 6" class="w-80 h-60" width="320" height="240">
                        </picture>
                    </span>

                    <div class="flex gap-4">
                        <span class="flex-none">
                            <picture>
                                <source srcset="i/webp/12.webp" type="image/webp">
                                <img loading="lazy" src="i/12.jpg" alt="Image 7" class="w-80 h-auto" width="320" height="240">
                            </picture>
                        </span>
                        <span class="flex-none">
                            <picture>
                                <source srcset="i/webp/13.webp" type="image/webp">
                                <img loading="lazy" src="i/13.jpg" alt="Image 8" class="w-80 h-60" width="320" height="240">
                            </picture>
                        </span>
                        <span class="flex-none">
                            <picture>
                                <source srcset="i/webp/14.webp" type="image/webp">
                                <img loading="lazy" src="i/14.jpg" alt="Image 9" class="w-80 h-60" width="320" height="240">
                            </picture>
                        </span>
                    </div>
                </div>
            </div>
        </div>
        <i class="fa-solid fa-forward ml-5 p-5 bg-gray-500 text-blue-200 rounded-3xl cursor-pointer" id="nextbtn"></i>
    </div>
    <script src="script2.js"></script>
</body>
</html>
